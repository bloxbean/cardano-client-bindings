name: Publish npm packages

# Publishes the per-platform npm packages (@bloxbean/cardano-client-lib-<platform>) plus the main
# @bloxbean/cardano-client-lib package (see docs/adr/0012) on a v* tag via npm trusted publishing
# (OIDC, no token secret). The build/validation jobs live in build-js-packages.yml (run on PRs by
# publish-js-dry-run.yml); workflow_dispatch runs them here as a manual dry run (artifacts only,
# publish skipped).

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    uses: ./.github/workflows/build-js-packages.yml

  publish:
    needs: build
    runs-on: ubuntu-latest
    # Final human gate before the irreversible npm publish: the job pauses until a required reviewer
    # of the `npm-release` environment approves (configured in repo settings). See RELEASING.md.
    environment: npm-release
    # Trusted publishing: npm exchanges the GitHub OIDC token for publish credentials — no
    # npm token secret. Requires npm >= 11.5.1 and node >= 22.14. The publish commands must
    # stay in THIS file: npm's trusted publisher validates the top-level workflow filename.
    permissions:
      contents: read
      id-token: write
    env:
      PKG_VERSION: ${{ needs.build.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
      - name: Ensure npm supports trusted publishing
        run: npm install -g npm@latest
      - uses: actions/download-artifact@v4
        with:
          pattern: npmpkg-*
          merge-multiple: true
          path: dist
      - name: Unpack platform packages
        run: |
          set -eux
          for t in dist/platform-*.tgz; do
            d="pkgs/$(basename "$t" .tgz)"
            mkdir -p "$d"
            tar xzf "$t" -C "$d" --strip-components=1
          done
      # This job publishes from its own checkout, so stamp the version here too (the build
      # workflow stamped its own copy only).
      - name: Set package version from gradle.properties
        run: node wrappers/js/scripts/set-package-version.mjs "$PKG_VERSION"

      # Publish only on a tag (workflow_dispatch stays a dry run). Platform packages first, then
      # the main package (so its optionalDependencies already exist). Pre-release versions get a
      # matching npm dist-tag so they never become `latest`.
      - name: Publish to npm
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          set -eux
          rm -f wrappers/js/libs/libccl.*
          NPM_TAG=latest
          case "$PKG_VERSION" in
            *-preview*|*-pre*|*-alpha*) NPM_TAG=preview ;;
            *-beta*)                    NPM_TAG=beta ;;
            *-rc*)                      NPM_TAG=next ;;
          esac
          # Leading ./ is required: npm reads a bare "pkgs/platform-x" as the github:owner/repo
          # shorthand and tries to git-fetch it, instead of publishing the local directory.
          for d in pkgs/platform-*; do npm publish "./$d" --access public --provenance --tag "$NPM_TAG"; done
          npm publish ./wrappers/js --access public --provenance --tag "$NPM_TAG"
