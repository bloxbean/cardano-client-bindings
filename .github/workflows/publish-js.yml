name: Publish npm packages

# Builds the per-platform npm packages (@bloxbean/cardano-client-lib-<platform>) plus the main
# @bloxbean/cardano-client-lib package (see docs/adr/0012), and on a v* tag — when repo variable
# NPM_PUBLISH=true — publishes them to npm via trusted publishing (OIDC, no token secret).
# PRs touching this file and workflow_dispatch build the packages as artifacts only.
#
# The version comes from `version` in gradle.properties; the v* tag and wrappers/js/package.json
# must match it (CI fails otherwise). One-time npm trusted-publisher setup: see
# wrappers/js/scripts/bootstrap-npm-trusted-publishing.sh.

on:
  push:
    tags: ['v*']
  pull_request:
    paths:
      - '.github/workflows/publish-js.yml'
  workflow_dispatch:

jobs:
  # Single source of truth for the package version: `version` in gradle.properties (the same
  # value the native lib's ccl_version is generated from — see RELEASING.md). On a tag push the
  # tag must be exactly v<version>, so a mistyped tag can never publish a mismatched version.
  validate:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - name: Read version from gradle.properties
        id: version
        run: |
          set -euo pipefail
          VERSION=$(sed -n 's/^version=//p' gradle.properties | tr -d '[:space:]')
          if [ -z "$VERSION" ]; then
            echo "No version found in gradle.properties" >&2
            exit 1
          fi
          if [[ "$GITHUB_REF" == refs/tags/* && "$GITHUB_REF_NAME" != "v$VERSION" ]]; then
            echo "Git tag $GITHUB_REF_NAME does not match gradle.properties version $VERSION (expected tag v$VERSION)" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

  # macOS (arm64 + Intel) and Windows: build the lib on the native runner, assemble the platform pkg.
  pkg-native:
    name: npm pkg (${{ matrix.platform }})
    needs: validate
    runs-on: ${{ matrix.os }}
    env:
      PKG_VERSION: ${{ needs.validate.outputs.version }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            platform: macos-aarch64
            libext: dylib
            npm_os: darwin
            npm_cpu: arm64
          - os: windows-latest
            platform: windows-x86_64
            libext: dll
            npm_os: win32
            npm_cpu: x64
    steps:
      - uses: actions/checkout@v4
      - uses: graalvm/setup-graalvm@v1
        with:
          java-version: '25.0.3'
          distribution: 'graalvm'
      - name: Build native library
        shell: bash
        run: ./gradlew :core:nativeCompile
      - name: Assemble the platform package tarball
        shell: bash
        run: |
          set -eux
          ND=core/build/native/nativeCompile
          rm -rf package && mkdir -p package
          cp "$ND/libccl.${{ matrix.libext }}" package/
          cat > package/package.json <<JSON
          {
            "name": "@bloxbean/cardano-client-lib-${{ matrix.platform }}",
            "version": "${PKG_VERSION}",
            "description": "CCL Bridge native library for ${{ matrix.platform }}",
            "os": ["${{ matrix.npm_os }}"],
            "cpu": ["${{ matrix.npm_cpu }}"],
            "files": ["libccl.${{ matrix.libext }}"],
            "license": "MIT",
            "repository": {
              "type": "git",
              "url": "git+https://github.com/bloxbean/cardano-client-bindings.git"
            }
          }
          JSON
          echo "CCL Bridge native library for \`${{ matrix.platform }}\`. Installed automatically as an optionalDependency of \`@bloxbean/cardano-client-lib\`." > package/README.md
          tar czf "platform-${{ matrix.platform }}.tgz" package
      - uses: actions/upload-artifact@v4
        with:
          name: npmpkg-${{ matrix.platform }}
          path: platform-${{ matrix.platform }}.tgz

  # Linux: build the lib in the manylinux_2_28 container (glibc-2.17 baseline, ADR-0008), then
  # assemble the platform pkg with tar (no node needed in the container).
  pkg-linux:
    name: npm pkg (${{ matrix.platform }})
    needs: validate
    runs-on: ${{ matrix.runner }}
    env:
      PKG_VERSION: ${{ needs.validate.outputs.version }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-x86_64
            runner: ubuntu-latest
            image: quay.io/pypa/manylinux_2_28_x86_64
            graalvm_url: https://download.oracle.com/graalvm/25/archive/graalvm-jdk-25.0.3_linux-x64_bin.tar.gz
            npm_cpu: x64
          - platform: linux-aarch64
            runner: ubuntu-24.04-arm
            image: quay.io/pypa/manylinux_2_28_aarch64
            graalvm_url: https://download.oracle.com/graalvm/25/archive/graalvm-jdk-25.0.3_linux-aarch64_bin.tar.gz
            npm_cpu: arm64
    container:
      image: ${{ matrix.image }}
    steps:
      - uses: actions/checkout@v4
      - name: Ensure build prerequisites
        run: dnf install -y zlib-devel || true
      - name: Install Oracle GraalVM 25.0.3
        run: |
          set -eux
          mkdir -p /opt/graalvm
          curl -fsSL -o /tmp/graalvm.tar.gz "${{ matrix.graalvm_url }}"
          tar xzf /tmp/graalvm.tar.gz -C /opt/graalvm --strip-components=1
          echo "JAVA_HOME=/opt/graalvm" >> "$GITHUB_ENV"
          echo "/opt/graalvm/bin" >> "$GITHUB_PATH"
      - name: Build native library
        run: ./gradlew :core:nativeCompile --no-daemon --stacktrace
      - name: Assemble the platform package tarball
        run: |
          set -eux
          ND=core/build/native/nativeCompile
          rm -rf package && mkdir -p package
          cp "$ND/libccl.so" package/
          cat > package/package.json <<JSON
          {
            "name": "@bloxbean/cardano-client-lib-${{ matrix.platform }}",
            "version": "${PKG_VERSION}",
            "description": "CCL Bridge native library for ${{ matrix.platform }}",
            "os": ["linux"],
            "cpu": ["${{ matrix.npm_cpu }}"],
            "files": ["libccl.so"],
            "license": "MIT",
            "repository": {
              "type": "git",
              "url": "git+https://github.com/bloxbean/cardano-client-bindings.git"
            }
          }
          JSON
          echo "CCL Bridge native library for ${{ matrix.platform }}. Installed automatically as an optionalDependency of @bloxbean/cardano-client-lib." > package/README.md
          tar czf "platform-${{ matrix.platform }}.tgz" package
      - uses: actions/upload-artifact@v4
        with:
          name: npmpkg-${{ matrix.platform }}
          path: platform-${{ matrix.platform }}.tgz

  publish:
    needs: [validate, pkg-native, pkg-linux]
    runs-on: ubuntu-latest
    # Trusted publishing: npm exchanges the GitHub OIDC token for publish credentials — no
    # npm token secret. Requires npm >= 11.5.1 and node >= 22.14.
    permissions:
      contents: read
      id-token: write
    env:
      PKG_VERSION: ${{ needs.validate.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
      - name: Ensure npm supports trusted publishing
        run: npm install -g npm@latest
      - uses: actions/download-artifact@v4
        with:
          pattern: npmpkg-*
          merge-multiple: true
          path: dist
      - name: Unpack platform packages
        run: |
          set -eux
          for t in dist/platform-*.tgz; do
            d="pkgs/$(basename "$t" .tgz)"
            mkdir -p "$d"
            tar xzf "$t" -C "$d" --strip-components=1
          done
      # The main package and its optionalDependencies pins must carry the same version as
      # gradle.properties, or the platform packages published above would never be resolved
      # (and the dist-tag below could misclassify). Runs on PR builds too, so drift is caught
      # before a release tag.
      - name: Check package.json is in lockstep with gradle.properties
        run: |
          node -e '
            const pkg = require("./wrappers/js/package.json");
            const v = process.env.PKG_VERSION;
            const bad = [];
            if (pkg.version !== v) bad.push(`version is ${pkg.version}`);
            for (const [name, range] of Object.entries(pkg.optionalDependencies ?? {}))
              if (range !== v) bad.push(`optionalDependencies[${name}] is ${range}`);
            if (bad.length) {
              console.error(`wrappers/js/package.json out of lockstep with gradle.properties version ${v}:\n  ` + bad.join("\n  "));
              process.exit(1);
            }
            console.log(`package.json in lockstep at ${v}`);
          '
      - name: Pack the main package
        run: |
          set -eux
          # The published main package carries no lib (libs/ stays empty); the platform packages do.
          rm -f wrappers/js/libs/libccl.*
          npm pack --pack-destination "$PWD/dist" ./wrappers/js
      - name: List packages to publish
        run: ls -la dist pkgs

      # Publish only on a tag AND when an admin has enabled it. Platform packages first, then the
      # main package (so its optionalDependencies already exist). Package directories (not
      # tarballs) are published — the pattern proven with trusted publishing in bloxbean/yano.
      # Pre-release versions get a matching npm dist-tag (same rules as bloxbean/yano) so they
      # never become `latest`.
      - name: Publish to npm
        if: startsWith(github.ref, 'refs/tags/') && vars.NPM_PUBLISH == 'true'
        run: |
          set -eux
          NPM_TAG=latest
          case "$PKG_VERSION" in
            *-preview*|*-pre*|*-alpha*) NPM_TAG=preview ;;
            *-beta*)                    NPM_TAG=beta ;;
            *-rc*)                      NPM_TAG=next ;;
          esac
          for d in pkgs/platform-*; do npm publish "$d" --access public --provenance --tag "$NPM_TAG"; done
          npm publish ./wrappers/js --access public --provenance --tag "$NPM_TAG"
