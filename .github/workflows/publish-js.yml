name: Publish npm packages

# Builds one per-platform npm package (@bloxbean/cardano-client-lib-<platform>, each carrying that platform's
# libccl.*) plus the main @bloxbean/cardano-client-lib package, and — when enabled by an admin — publishes them to
# npm. Consumers install @bloxbean/cardano-client-lib; its optionalDependencies pull in only the package matching
# their os/cpu, and the loader finds the bundled lib there. See
# docs/adr/0012-native-lib-bundled-in-wrapper-packages.md.
#
# Triggers:
#   - a version tag (v*)   -> build + (gated) publish to npm
#   - pull_request touching this file -> build the packages as artifacts only (validation)
#   - workflow_dispatch    -> build the packages as artifacts only
#
# Enabling npm publish (admin, one-time):
#   1. Create an npm automation token with publish rights to the @bloxbean scope; add it as the
#      `NPM_TOKEN` repository secret.
#   2. Set repository variable `NPM_PUBLISH=true`.
#   Until then the publish step is skipped; the package tarballs are still produced as artifacts.

on:
  push:
    tags: ['v*']
  pull_request:
    paths:
      - '.github/workflows/publish-js.yml'
  workflow_dispatch:

env:
  PKG_VERSION: "0.1.0"

jobs:
  # macOS (arm64 + Intel) and Windows: build the lib on the native runner, assemble the platform pkg.
  pkg-native:
    name: npm pkg (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            platform: macos-aarch64
            libext: dylib
            npm_os: darwin
            npm_cpu: arm64
          - os: windows-latest
            platform: windows-x86_64
            libext: dll
            npm_os: win32
            npm_cpu: x64
    steps:
      - uses: actions/checkout@v4
      - uses: graalvm/setup-graalvm@v1
        with:
          java-version: '25.0.3'
          distribution: 'graalvm'
      - name: Build native library
        shell: bash
        run: ./gradlew :core:nativeCompile
      - name: Assemble the platform package tarball
        shell: bash
        run: |
          set -eux
          ND=core/build/native/nativeCompile
          rm -rf package && mkdir -p package
          cp "$ND/libccl.${{ matrix.libext }}" package/
          cat > package/package.json <<JSON
          {
            "name": "@bloxbean/cardano-client-lib-${{ matrix.platform }}",
            "version": "${PKG_VERSION}",
            "description": "CCL Bridge native library for ${{ matrix.platform }}",
            "os": ["${{ matrix.npm_os }}"],
            "cpu": ["${{ matrix.npm_cpu }}"],
            "files": ["libccl.${{ matrix.libext }}"],
            "license": "MIT"
          }
          JSON
          echo "CCL Bridge native library for \`${{ matrix.platform }}\`. Installed automatically as an optionalDependency of \`@bloxbean/cardano-client-lib\`." > package/README.md
          tar czf "platform-${{ matrix.platform }}.tgz" package
      - uses: actions/upload-artifact@v4
        with:
          name: npmpkg-${{ matrix.platform }}
          path: platform-${{ matrix.platform }}.tgz

  # Linux: build the lib in the manylinux_2_28 container (glibc-2.17 baseline, ADR-0008), then
  # assemble the platform pkg with tar (no node needed in the container).
  pkg-linux:
    name: npm pkg (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-x86_64
            runner: ubuntu-latest
            image: quay.io/pypa/manylinux_2_28_x86_64
            graalvm_url: https://download.oracle.com/graalvm/25/archive/graalvm-jdk-25.0.3_linux-x64_bin.tar.gz
            npm_cpu: x64
          - platform: linux-aarch64
            runner: ubuntu-24.04-arm
            image: quay.io/pypa/manylinux_2_28_aarch64
            graalvm_url: https://download.oracle.com/graalvm/25/archive/graalvm-jdk-25.0.3_linux-aarch64_bin.tar.gz
            npm_cpu: arm64
    container:
      image: ${{ matrix.image }}
    steps:
      - uses: actions/checkout@v4
      - name: Ensure build prerequisites
        run: dnf install -y zlib-devel || true
      - name: Install Oracle GraalVM 25.0.3
        run: |
          set -eux
          mkdir -p /opt/graalvm
          curl -fsSL -o /tmp/graalvm.tar.gz "${{ matrix.graalvm_url }}"
          tar xzf /tmp/graalvm.tar.gz -C /opt/graalvm --strip-components=1
          echo "JAVA_HOME=/opt/graalvm" >> "$GITHUB_ENV"
          echo "/opt/graalvm/bin" >> "$GITHUB_PATH"
      - name: Build native library
        run: ./gradlew :core:nativeCompile --no-daemon --stacktrace
      - name: Assemble the platform package tarball
        run: |
          set -eux
          ND=core/build/native/nativeCompile
          rm -rf package && mkdir -p package
          cp "$ND/libccl.so" package/
          cat > package/package.json <<JSON
          {
            "name": "@bloxbean/cardano-client-lib-${{ matrix.platform }}",
            "version": "${PKG_VERSION}",
            "description": "CCL Bridge native library for ${{ matrix.platform }}",
            "os": ["linux"],
            "cpu": ["${{ matrix.npm_cpu }}"],
            "files": ["libccl.so"],
            "license": "MIT"
          }
          JSON
          echo "CCL Bridge native library for ${{ matrix.platform }}. Installed automatically as an optionalDependency of @bloxbean/cardano-client-lib." > package/README.md
          tar czf "platform-${{ matrix.platform }}.tgz" package
      - uses: actions/upload-artifact@v4
        with:
          name: npmpkg-${{ matrix.platform }}
          path: platform-${{ matrix.platform }}.tgz

  publish:
    needs: [pkg-native, pkg-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
      - uses: actions/download-artifact@v4
        with:
          pattern: npmpkg-*
          merge-multiple: true
          path: dist
      - name: Pack the main package
        run: |
          set -eux
          # The published main package carries no lib (libs/ stays empty); the platform packages do.
          rm -f wrappers/js/libs/libccl.*
          npm pack --pack-destination "$PWD/dist" ./wrappers/js
      - name: List packages to publish
        run: ls -la dist

      # Publish only on a tag AND when an admin has enabled it. Platform packages first, then the
      # main package (so its optionalDependencies already exist).
      - name: Publish to npm
        if: startsWith(github.ref, 'refs/tags/') && vars.NPM_PUBLISH == 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -eux
          for t in dist/platform-*.tgz; do npm publish "$t" --access public; done
          npm publish dist/bloxbean-*.tgz --access public
