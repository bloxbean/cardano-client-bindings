name: Build npm packages

# Reusable (workflow_call) build + validation of the npm packages — everything except publishing.
# Called by publish-js.yml (release) and publish-js-dry-run.yml (PR validation).
#
# The version comes from `version` in gradle.properties (single source of truth); on a v* tag the
# tag must match it. The version and optionalDependencies pins in wrappers/js/package.json are
# stamped from it at build time (scripts/set-package-version.mjs) — never hand-maintained.

on:
  workflow_call:
    outputs:
      version:
        description: Package version read from gradle.properties
        value: ${{ jobs.validate.outputs.version }}

jobs:
  validate:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - name: Read version from gradle.properties
        id: version
        run: |
          set -euo pipefail
          VERSION=$(sed -n 's/^version=//p' gradle.properties | tr -d '[:space:]')
          if [ -z "$VERSION" ]; then
            echo "No version found in gradle.properties" >&2
            exit 1
          fi
          if [[ "$GITHUB_REF" == refs/tags/* && "$GITHUB_REF_NAME" != "v$VERSION" ]]; then
            echo "Git tag $GITHUB_REF_NAME does not match gradle.properties version $VERSION (expected tag v$VERSION)" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

  # macOS and Windows: build the lib on the native runner, assemble the platform pkg.
  pkg-native:
    name: npm pkg (${{ matrix.platform }})
    needs: validate
    runs-on: ${{ matrix.os }}
    env:
      PKG_VERSION: ${{ needs.validate.outputs.version }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            platform: macos-aarch64
            libext: dylib
            npm_os: darwin
            npm_cpu: arm64
          - os: windows-latest
            platform: windows-x86_64
            libext: dll
            npm_os: win32
            npm_cpu: x64
    steps:
      - uses: actions/checkout@v4
      - uses: graalvm/setup-graalvm@v1
        with:
          java-version: '25.0.3'
          distribution: 'graalvm'
      - name: Build native library
        shell: bash
        run: ./gradlew :core:nativeCompile
      - name: Assemble the platform package tarball
        shell: bash
        run: |
          set -eux
          ND=core/build/native/nativeCompile
          rm -rf package && mkdir -p package
          cp "$ND/libccl.${{ matrix.libext }}" package/
          cat > package/package.json <<JSON
          {
            "name": "@bloxbean/cardano-client-lib-${{ matrix.platform }}",
            "version": "${PKG_VERSION}",
            "description": "CCL Bridge native library for ${{ matrix.platform }}",
            "os": ["${{ matrix.npm_os }}"],
            "cpu": ["${{ matrix.npm_cpu }}"],
            "files": ["libccl.${{ matrix.libext }}"],
            "license": "MIT",
            "repository": {
              "type": "git",
              "url": "git+https://github.com/bloxbean/cardano-client-bindings.git"
            }
          }
          JSON
          echo "CCL Bridge native library for \`${{ matrix.platform }}\`. Installed automatically as an optionalDependency of \`@bloxbean/cardano-client-lib\`." > package/README.md
          tar czf "platform-${{ matrix.platform }}.tgz" package
      - uses: actions/upload-artifact@v4
        with:
          name: npmpkg-${{ matrix.platform }}
          path: platform-${{ matrix.platform }}.tgz

  # Linux: build the lib in the manylinux_2_28 container (glibc-2.17 baseline, ADR-0008), then
  # assemble the platform pkg with tar (no node needed in the container).
  pkg-linux:
    name: npm pkg (${{ matrix.platform }})
    needs: validate
    runs-on: ${{ matrix.runner }}
    env:
      PKG_VERSION: ${{ needs.validate.outputs.version }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-x86_64
            runner: ubuntu-latest
            image: quay.io/pypa/manylinux_2_28_x86_64
            graalvm_url: https://download.oracle.com/graalvm/25/archive/graalvm-jdk-25.0.3_linux-x64_bin.tar.gz
            npm_cpu: x64
          - platform: linux-aarch64
            runner: ubuntu-24.04-arm
            image: quay.io/pypa/manylinux_2_28_aarch64
            graalvm_url: https://download.oracle.com/graalvm/25/archive/graalvm-jdk-25.0.3_linux-aarch64_bin.tar.gz
            npm_cpu: arm64
    container:
      image: ${{ matrix.image }}
    steps:
      - uses: actions/checkout@v4
      - name: Ensure build prerequisites
        run: dnf install -y zlib-devel || true
      - name: Install Oracle GraalVM 25.0.3
        run: |
          set -eux
          mkdir -p /opt/graalvm
          curl -fsSL -o /tmp/graalvm.tar.gz "${{ matrix.graalvm_url }}"
          tar xzf /tmp/graalvm.tar.gz -C /opt/graalvm --strip-components=1
          echo "JAVA_HOME=/opt/graalvm" >> "$GITHUB_ENV"
          echo "/opt/graalvm/bin" >> "$GITHUB_PATH"
      - name: Build native library
        run: ./gradlew :core:nativeCompile --no-daemon --stacktrace
      - name: Assemble the platform package tarball
        run: |
          set -eux
          ND=core/build/native/nativeCompile
          rm -rf package && mkdir -p package
          cp "$ND/libccl.so" package/
          cat > package/package.json <<JSON
          {
            "name": "@bloxbean/cardano-client-lib-${{ matrix.platform }}",
            "version": "${PKG_VERSION}",
            "description": "CCL Bridge native library for ${{ matrix.platform }}",
            "os": ["linux"],
            "cpu": ["${{ matrix.npm_cpu }}"],
            "libc": ["glibc"],
            "files": ["libccl.so"],
            "license": "MIT",
            "repository": {
              "type": "git",
              "url": "git+https://github.com/bloxbean/cardano-client-bindings.git"
            }
          }
          JSON
          echo "CCL Bridge native library for ${{ matrix.platform }}. Installed automatically as an optionalDependency of @bloxbean/cardano-client-lib." > package/README.md
          tar czf "platform-${{ matrix.platform }}.tgz" package
      - uses: actions/upload-artifact@v4
        with:
          name: npmpkg-${{ matrix.platform }}
          path: platform-${{ matrix.platform }}.tgz

  # Linux/musl (Alpine): the glibc .so above cannot load on musl, so ship a separate package built
  # with native-image --libc=musl. Without this an Alpine user installs the glibc package — `os` and
  # `cpu` both match on Alpine, and only the `libc` field distinguishes them — and gets a load error.
  #
  # x86_64 only: GraalVM's --libc=musl hardcodes the x86_64-linux-musl-gcc compiler name and never
  # looks for an aarch64 one, so musl/aarch64 cannot be built. See ADR-0008.
  pkg-musl:
    name: npm pkg (linux-musl-x86_64)
    needs: validate
    runs-on: ubuntu-latest
    env:
      PKG_VERSION: ${{ needs.validate.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Oracle GraalVM 25.0.3
        run: |
          set -eux
          mkdir -p /opt/graalvm
          curl -fsSL -o /tmp/graalvm.tar.gz \
            "https://download.oracle.com/graalvm/25/archive/graalvm-jdk-25.0.3_linux-x64_bin.tar.gz"
          tar xzf /tmp/graalvm.tar.gz -C /opt/graalvm --strip-components=1
          echo "JAVA_HOME=/opt/graalvm" >> "$GITHUB_ENV"
          echo "/opt/graalvm/bin" >> "$GITHUB_PATH"

      - name: Install musl toolchain (musl-gcc + musl-linked zlib)
        run: |
          set -eux
          sudo apt-get update
          sudo apt-get install -y musl-tools musl-dev
          # native-image --libc=musl needs a musl-linked static zlib (libz.a).
          ZV=1.3.1
          curl -fsSL -o /tmp/zlib.tar.gz \
            "https://github.com/madler/zlib/releases/download/v${ZV}/zlib-${ZV}.tar.gz"
          tar xzf /tmp/zlib.tar.gz -C /tmp
          cd "/tmp/zlib-${ZV}"
          CC=musl-gcc ./configure --static --prefix=/usr/local/musl
          make -j"$(nproc)"
          sudo make install
          sudo cp /usr/local/musl/lib/libz.a /usr/lib/x86_64-linux-musl/ 2>/dev/null || true

      - name: Build libccl.so against musl
        run: ./gradlew :core:nativeCompile -PmuslBuild --no-daemon --stacktrace

      - name: Assert it really is musl-linked
        run: |
          set -eux
          SO=core/build/native/nativeCompile/libccl.so
          # A glibc build NEEDs libc.so.6; the musl one must not. Guards against silently shipping a
          # glibc .so under a musl package name — which would fail only on a user's Alpine box.
          if readelf -d "$SO" | grep -q 'libc.so.6'; then
            echo "FAIL: glibc-linked .so in the musl package" >&2
            exit 1
          fi

      - name: Assemble the platform package tarball
        run: |
          set -eux
          ND=core/build/native/nativeCompile
          rm -rf package && mkdir -p package
          cp "$ND/libccl.so" package/
          cat > package/package.json <<JSON
          {
            "name": "@bloxbean/cardano-client-lib-linux-musl-x86_64",
            "version": "${PKG_VERSION}",
            "description": "CCL Bridge native library for linux-musl-x86_64 (Alpine)",
            "os": ["linux"],
            "cpu": ["x64"],
            "libc": ["musl"],
            "files": ["libccl.so"],
            "license": "MIT",
            "repository": {
              "type": "git",
              "url": "git+https://github.com/bloxbean/cardano-client-bindings.git"
            }
          }
          JSON
          echo "CCL Bridge native library for linux-musl-x86_64 (Alpine / musl). Installed automatically as an optionalDependency of @bloxbean/cardano-client-lib." > package/README.md
          tar czf "platform-linux-musl-x86_64.tgz" package
      - uses: actions/upload-artifact@v4
        with:
          name: npmpkg-linux-musl-x86_64
          path: platform-linux-musl-x86_64.tgz

  verify:
    needs: [validate, pkg-native, pkg-linux, pkg-musl]
    runs-on: ubuntu-latest
    env:
      PKG_VERSION: ${{ needs.validate.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - uses: actions/download-artifact@v4
        with:
          pattern: npmpkg-*
          merge-multiple: true
          path: dist
      - name: Unpack platform packages
        run: |
          set -eux
          for t in dist/platform-*.tgz; do
            d="pkgs/$(basename "$t" .tgz)"
            mkdir -p "$d"
            tar xzf "$t" -C "$d" --strip-components=1
          done
      # Stamp the gradle.properties version into package.json (version + optionalDependencies
      # pins) so it is never hand-maintained there.
      - name: Set package version from gradle.properties
        run: node wrappers/js/scripts/set-package-version.mjs "$PKG_VERSION"
      - name: Pack the main package
        run: |
          set -eux
          # The published main package carries no lib (libs/ stays empty); the platform packages do.
          rm -f wrappers/js/libs/libccl.*
          npm pack --pack-destination "$PWD/dist" ./wrappers/js
      - name: List built packages
        run: ls -la dist pkgs
