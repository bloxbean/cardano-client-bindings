name: musl / Alpine lib

# Builds + guards the musl variant of libccl.so, so it loads and runs on Alpine / musl-based images
# (the common Docker base) — the glibc-baseline .so (portable-linux-lib.yml) cannot load there.
#
# native-image's musl support is documented for static executables; it also works for our shared
# library via `--libc=musl` (built with a musl toolchain: musl-gcc + a musl-linked zlib). Built on
# ubuntu (glibc — so actions/node work), then loaded AND run inside a real Alpine container: create
# the GraalVM isolate and call an entry point, proving musl works at runtime, not just that the file
# opens. See docs/adr/0008-linux-glibc-baseline-portability.md.
#
# x86_64 only: GraalVM's `--libc=musl` toolchain detection hardcodes the `x86_64-linux-musl-gcc`
# compiler name and does not look for `aarch64-linux-musl-gcc`, so aarch64 musl is unsupported. See
# ADR-0008 for details.

on:
  pull_request:
  push:
    branches: [develop, main]
  workflow_dispatch:

jobs:
  musl:
    name: Build libccl.so (musl, x86_64) + run on Alpine
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Oracle GraalVM 25.0.3
        run: |
          set -eux
          mkdir -p /opt/graalvm
          curl -fsSL -o /tmp/graalvm.tar.gz \
            "https://download.oracle.com/graalvm/25/archive/graalvm-jdk-25.0.3_linux-x64_bin.tar.gz"
          tar xzf /tmp/graalvm.tar.gz -C /opt/graalvm --strip-components=1
          echo "JAVA_HOME=/opt/graalvm" >> "$GITHUB_ENV"
          echo "/opt/graalvm/bin" >> "$GITHUB_PATH"

      - name: Install musl toolchain (musl-gcc + musl-linked zlib)
        run: |
          set -eux
          sudo apt-get update
          sudo apt-get install -y musl-tools musl-dev
          # native-image --libc=musl needs a musl-linked static zlib (libz.a).
          ZV=1.3.1
          curl -fsSL -o /tmp/zlib.tar.gz \
            "https://github.com/madler/zlib/releases/download/v${ZV}/zlib-${ZV}.tar.gz"
          tar xzf /tmp/zlib.tar.gz -C /tmp
          cd "/tmp/zlib-${ZV}"
          CC=musl-gcc ./configure --static --prefix=/usr/local/musl
          make -j"$(nproc)"
          sudo make install
          sudo cp /usr/local/musl/lib/libz.a /usr/lib/x86_64-linux-musl/ 2>/dev/null || true

      - name: Build libccl.so against musl (--libc=musl)
        run: ./gradlew :core:nativeCompile -PmuslBuild --no-daemon --stacktrace

      - name: Inspect the built .so
        run: |
          set -eux
          SO=core/build/native/nativeCompile/libccl.so
          file "$SO"
          # musl links libc.so (glibc would be libc.so.6); assert it's the musl variant.
          readelf -d "$SO" | grep -E 'NEEDED'
          readelf -d "$SO" | grep -q 'libc.so.6' && { echo "FAIL: glibc-linked, not musl"; exit 1; } || true

      - name: Functional run test (create isolate + call an entry point) on Alpine
        run: |
          set -eux
          # A real run, not just dlopen: bring up the GraalVM isolate and call ccl_version.
          cat > musl_smoke.c <<'C'
          #include <dlfcn.h>
          #include <stdio.h>
          typedef int  (*create_isolate_t)(void*, void**, void**);
          typedef int  (*ccl_version_t)(void*);
          typedef char*(*ccl_get_result_t)(void*);
          int main(void) {
            void *h = dlopen("/out/libccl.so", RTLD_NOW);
            if (!h) { printf("FAIL dlopen: %s\n", dlerror()); return 1; }
            create_isolate_t create = (create_isolate_t)dlsym(h, "graal_create_isolate");
            ccl_version_t version   = (ccl_version_t)dlsym(h, "ccl_version");
            ccl_get_result_t result = (ccl_get_result_t)dlsym(h, "ccl_get_result");
            if (!create || !version || !result) { printf("FAIL dlsym\n"); return 1; }
            void *iso = 0, *thr = 0;
            if (create(0, &iso, &thr) != 0) { printf("FAIL create_isolate\n"); return 1; }
            if (version(thr) != 0)          { printf("FAIL ccl_version\n"); return 1; }
            printf("OK: libccl runs on Alpine/musl — version=%s\n", result(thr));
            return 0;
          }
          C
          docker run --rm -v "$PWD:/w" -w /w \
            -v "$PWD/core/build/native/nativeCompile:/out" alpine:3.20 sh -c '
              apk add --no-cache build-base >/dev/null
              gcc musl_smoke.c -o /tmp/musl_smoke -ldl
              /tmp/musl_smoke
            '

      - name: Verify Go + Rust wrappers auto-select musl on Alpine
        run: |
          set -eux
          # Proves the wrapper auto-selection end-to-end on a real musl system: the loaders must
          # resolve slug=linux-musl-x86_64 and load the musl lib with NO CCL_LIB_PATH. The lib is
          # seeded (Go cache) / in-tree (Rust) here, standing in for the release download.
          docker run --rm -v "$PWD:/w" -w /w \
            -v "$PWD/core/build/native/nativeCompile:/out" alpine:3.20 sh -c '
              set -eux
              apk add --no-cache build-base go cargo >/dev/null

              # Go — runtime musl detection: the slug test asserts linux-musl-x86_64 on real musl, and
              # the example loads the seeded musl lib with no env vars. Read the cache dir from the
              # wrapper'"'"'s own pinned version rather than hardcoding it, so a version bump cannot
              # silently turn this into a network download (or a miss) without anyone noticing.
              GOVER=$(sed -n '"'"'s/.*defaultLibVersion = "\(.*\)".*/\1/p'"'"' wrappers/go/ccl/loader.go)
              CACHE="$HOME/.cache/cardano-client-bindings/$GOVER"
              mkdir -p "$CACHE"; cp /out/libccl.so "$CACHE/libccl.so"
              ( cd wrappers/go
                env -u CCL_LIB_PATH go test -run "PlatformSlug|Musl" ./ccl/
                env -u CCL_LIB_PATH CGO_ENABLED=0 go run ./examples/account | head -1 )

              # Rust — build-time musl detection: Alpine targets x86_64-unknown-linux-musl, so build.rs
              # picks linux-musl-x86_64; it uses the in-tree musl lib and the example runs.
              ( cd wrappers/rust
                env -u CCL_LIB_PATH cargo run --quiet --example account | head -1 )

              echo "OK: Go + Rust auto-selected + ran the musl libccl on Alpine, no CCL_LIB_PATH"
            '

      # Python and JS are the two wrappers that *bundle* the lib rather than fetching it from the
      # release, so a musl libccl existing on the release does nothing for them — they need a musl
      # artifact of their own (a musllinux wheel; a linux-musl-x86_64 npm package). Both are now
      # built, and these steps prove they actually work on Alpine, which is the only way to know the
      # artifact is right rather than merely present.
      - name: Verify the Python musllinux wheel installs and runs on Alpine
        run: |
          set -eux
          docker run --rm -v "$PWD:/w" -w /w \
            -v "$PWD/core/build/native/nativeCompile:/out" alpine:3.20 sh -c '
              set -eux
              apk add --no-cache python3 py3-pip >/dev/null

              # Stage the musl lib exactly as the wheel build does, then build the wheel here — on
              # musl, so setuptools tags it musllinux_*, not manylinux_*.
              mkdir -p wrappers/python/ccl/_libs
              cp /out/libccl.so wrappers/python/ccl/_libs/libccl.so

              python3 -m venv /tmp/venv
              /tmp/venv/bin/pip install --quiet build
              ( cd wrappers/python && /tmp/venv/bin/python -m build --wheel --no-isolation )

              WHEEL=$(ls wrappers/python/dist/*.whl)
              echo "built: $WHEEL"
              case "$WHEEL" in
                *musllinux*) ;;
                *) echo "FAIL: wheel is not musllinux-tagged: $WHEEL" >&2; exit 1 ;;
              esac

              # Install it clean and load the lib with NO env vars — the pip-install user experience.
              python3 -m venv /tmp/wheelvenv
              /tmp/wheelvenv/bin/pip install --quiet "$WHEEL"
              cd /tmp && env -u CCL_LIB_PATH -u LD_LIBRARY_PATH \
                /tmp/wheelvenv/bin/python -c "
              import ccl
              lib = ccl.CclLib()
              assert lib.version()
              lib.account.create(ccl.CclLib.TESTNET)
              print(\"OK: musllinux wheel works on Alpine, no CCL_LIB_PATH\")
              "
            '

      - name: Verify the JS wrapper runs on Alpine under Bun
        run: |
          set -eux
          # oven/bun:alpine is Bun'"'"'s own musl build — the runtime an Alpine user would actually have.
          docker run --rm -v "$PWD:/w" -w /w \
            -v "$PWD/core/build/native/nativeCompile:/out" oven/bun:alpine sh -c '
              set -eux
              mkdir -p wrappers/js/libs
              cp /out/libccl.so wrappers/js/libs/libccl.so
              cd wrappers/js
              env -u CCL_LIB_PATH -u LD_LIBRARY_PATH bun -e "
                import { CclBridge, platformSuffix, TESTNET } from \"./src/index.js\";

                // The regression this guards: platformSuffix() used to have no musl detection at all,
                // so on Alpine it returned linux-x86_64 and resolved the *glibc* package, which
                // cannot load under musl.
                const suffix = platformSuffix();
                if (suffix !== \"linux-musl-x86_64\") {
                  throw new Error(\`platformSuffix() = \${suffix} on Alpine; expected linux-musl-x86_64\`);
                }

                const bridge = new CclBridge();
                try {
                  if (!bridge.version()) throw new Error(\"no version\");
                  bridge.account.create(TESTNET);
                  console.log(\`OK: JS wrapper runs on Alpine/musl under Bun (suffix=\${suffix})\`);
                } finally {
                  bridge.close();
                }
              "
            '
