name: CI
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            label: Linux x86_64
          - os: macos-14
            label: macOS ARM64
          - os: macos-13
            label: macOS x86_64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: graalvm/setup-graalvm@v1
        with:
          java-version: '25.0.3'
          distribution: 'graalvm'
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-go@v5
        with:
          go-version: 'stable'
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Python test deps
        run: python3 -m pip install --break-system-packages pytest pyyaml
      - name: Build native library
        run: ./gradlew :core:nativeCompile
      - name: Run JVM tests
        run: ./gradlew :core:test
      - name: Run C tests
        run: ./gradlew :native-test:test
      - name: Run Python tests
        run: ./gradlew :wrappers:python:test
      - name: Run Go tests
        run: ./gradlew :wrappers:go:test
      - name: Run Rust tests
        run: ./gradlew :wrappers:rust:test
      - name: Run JS tests
        run: ./gradlew :wrappers:js:test

  # Windows: verify the native library (libccl.dll) builds and core logic passes.
  # Wrapper test coverage on Windows (Go cgo, C Makefile, etc.) is tracked separately
  # in TODO.md.
  windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
      - uses: graalvm/setup-graalvm@v1
        with:
          java-version: '25.0.3'
          distribution: 'graalvm'
      - name: Build native library (libccl.dll)
        run: ./gradlew :core:nativeCompile
      - name: Run JVM tests
        run: ./gradlew :core:test
