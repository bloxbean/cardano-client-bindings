name: Publish Rust crate

# Publishes the `cardano-client-lib` crate to crates.io on a version tag — gated behind an admin flag.
# Unlike the Python wheels / npm packages, the crate ships SOURCE ONLY: crates.io can't host the
# native binary, so the crate's `build.rs` fetches the matching `libccl` from this repo's GitHub
# release at the *consumer's* build time. There are therefore no per-platform artifacts here — just
# a single `cargo publish`.
#
# Enabling crates.io (admin, one-time):
#   1. Create a crates.io API token with publish rights for `cardano-client-lib`, and add it as the
#      `CARGO_REGISTRY_TOKEN` secret (Settings -> Secrets and variables -> Actions -> Secrets).
#   2. Set repository variable `CRATES_PUBLISH=true` (… -> Variables).
# Until both are set, this workflow only *validates* the crate (a dry-run publish); nothing uploads.

on:
  push:
    tags: ['v*']
  # Build-only validation when the workflow or the crate changes (publish is tag + flag gated, so a PR
  # never uploads). workflow_dispatch is unavailable until this file lands on the default branch, so
  # this path filter is how the crate gets validated pre-merge.
  pull_request:
    paths:
      - '.github/workflows/publish-rust.yml'
      - 'wrappers/rust/**'
  workflow_dispatch:

jobs:
  crate:
    name: crate (crates.io)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: graalvm/setup-graalvm@v1
        with:
          java-version: '25.0.3'
          distribution: 'graalvm'
      - uses: dtolnay/rust-toolchain@stable

      # cargo's verification build runs build.rs, which needs libccl. Build it here and point
      # CCL_LIB_PATH at it so the verify uses the in-tree lib instead of downloading from a release
      # (which, for an unreleased dev version, wouldn't exist yet).
      - name: Build native library (for the verification build)
        run: ./gradlew :core:nativeCompile
      - name: Point build.rs at the in-tree lib
        run: echo "CCL_LIB_PATH=$PWD/core/build/native/nativeCompile" >> "$GITHUB_ENV"

      # Always: package + verify-build the crate (catches metadata / packaging / build.rs regressions).
      - name: Validate the crate (dry-run publish)
        working-directory: wrappers/rust
        run: cargo publish --dry-run

      # Only on a version tag AND when an admin has enabled it.
      - name: Publish to crates.io
        if: startsWith(github.ref, 'refs/tags/v') && vars.CRATES_PUBLISH == 'true'
        working-directory: wrappers/rust
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish
