name: Publish Rust crate

# Publishes the `cardano-client-lib` crate to crates.io on a v* tag via crates.io trusted publishing
# (OIDC — no API token secret). The build/validation lives in build-rust-crate.yml (run on PRs by
# publish-rust-dry-run.yml); workflow_dispatch runs only that build job here as a manual dry run —
# the publish job is skipped entirely, so no environment approval is requested for a no-op.
#
# The crate ships SOURCE ONLY — crates.io can't host the native binary, so the crate's build.rs
# fetches the matching libccl from this repo's GitHub release at the *consumer's* build time. So the
# release must exist before/with the publish (see RELEASING.md).
#
# Version: `version` in gradle.properties is the single source of truth. Cargo.toml's `version` is
# stamped from it and build.rs derives the release tag it fetches from that; the v* tag must equal
# v<version>, so the published crate always points at the release it was built from.

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    uses: ./.github/workflows/build-rust-crate.yml

  publish:
    needs: build
    # Job-level, not step-level: the `crates-release` approval fires when the job *starts*, so
    # gating only the final steps would make a workflow_dispatch dry run page a release code owner
    # to approve a job that builds libccl for ~10 minutes and then skips the actual publish.
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    # Final human gate before the irreversible crates.io publish (a published version can never be
    # overwritten or deleted, only yanked): the job pauses until a required reviewer of the
    # `crates-release` environment approves (configured in repo settings). See RELEASING.md.
    environment: crates-release
    # Trusted publishing: crates.io exchanges the GitHub OIDC token for a short-lived publish token —
    # no CARGO_REGISTRY_TOKEN secret. Configure the trusted publisher on crates.io against this repo,
    # this workflow filename, and the `crates-release` environment.
    permissions:
      contents: read
      id-token: write
    env:
      CRATE_VERSION: ${{ needs.build.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: graalvm/setup-graalvm@v1
        with:
          java-version: '25.0.3'
          distribution: 'graalvm'
      - uses: dtolnay/rust-toolchain@stable

      # `cargo publish` verify-builds the crate, which runs build.rs. Point it at an in-tree libccl so
      # the verify doesn't depend on the release tarball already being downloadable.
      - name: Build native library (for the verification build)
        run: ./gradlew :core:nativeCompile
      - name: Point build.rs at the in-tree lib
        run: echo "CCL_LIB_PATH=$PWD/core/build/native/nativeCompile" >> "$GITHUB_ENV"

      - name: Stamp crate version from gradle.properties
        run: ./wrappers/rust/scripts/set-crate-version.sh "$CRATE_VERSION"

      - name: Authenticate to crates.io (trusted publishing)
        uses: rust-lang/crates-io-auth-action@v1
        id: auth

      - name: Publish to crates.io
        working-directory: wrappers/rust
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        # --allow-dirty: the version stamp above modifies Cargo.toml in the checkout.
        run: cargo publish --allow-dirty
