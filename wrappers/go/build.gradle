def nativeLibTask = project.hasProperty('usePrebuilt') ? ':core:downloadNativeLib' : ':core:nativeCompile'

task copyNativeLib(type: Copy) {
    dependsOn nativeLibTask
    from project(':core').layout.buildDirectory.dir('native/nativeCompile')
    into layout.buildDirectory.dir('native')
    include 'libccl.*'
    include '*.h'
}

task test(type: Exec) {
    dependsOn copyNativeLib
    workingDir file('ccl')

    def nativeDir = layout.buildDirectory.dir('native').get().asFile.absolutePath
    // purego dlopens libccl at runtime — no cgo, no C toolchain. CCL_LIB_PATH points it at the
    // freshly built library so tests use it instead of downloading from a release. CGO_ENABLED=0
    // proves the wrapper builds as pure Go.
    environment 'CCL_LIB_PATH', nativeDir
    environment 'CGO_ENABLED', '0'

    def goArch = System.getProperty("os.arch") == "aarch64" ? "arm64" : "amd64"
    environment 'GOARCH', goArch

    // Invoke `go` directly on Windows rather than via `bash` (a bare `bash` resolves to WSL on
    // Windows runners, which has no distro).
    // -timeout 30m: the DevKit integration tests health-gate every devnet reset (waiting for the
    // cluster to actually serve chain data), which puts the full suite past `go test`'s 10m default.
    if (org.gradle.internal.os.OperatingSystem.current().isWindows()) {
        commandLine 'go', 'test', '-v', '-timeout', '30m', './...'
    } else {
        commandLine 'bash', '-c', 'go test -v -timeout 30m ./...'
    }
}
